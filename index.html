<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявка в A10m</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #18222d);
            color: var(--tg-theme-text-color, #ffffff);
            padding: 20px; margin: 0; padding-bottom: 40px;
        }
        h2 { text-align: center; margin-bottom: 5px; }
        .warning { color: #ff4d4d; font-style: italic; font-size: 16px; text-align: center; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--tg-theme-hint-color, #aabfe5); font-size: 14px; }
        
        .row { display: flex; gap: 10px; margin-bottom: 15px; }
        .row > div { flex: 1; }
        
        input[type="text"], input[type="number"] {
            width: 100%; padding: 12px; box-sizing: border-box; border-radius: 8px;
            border: 1px solid var(--tg-theme-hint-color, #526377);
            background-color: var(--tg-theme-secondary-bg-color, #232e3c);
            color: var(--tg-theme-text-color, #ffffff); outline: none; font-size: 16px;
        }
        input:focus { border-color: var(--tg-theme-button-color, #2481cc); }

        .hours-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .hours-group input { width: 100px; margin-bottom: 0; }
        .hours-group span { font-size: 16px; font-weight: bold; color: var(--tg-theme-text-color, #ffffff); }

        .days-row {
            display: flex; justify-content: space-between; background: var(--tg-theme-secondary-bg-color, #232e3c);
            padding: 15px 10px; border-radius: 8px; border: 1px solid var(--tg-theme-hint-color, #526377);
            margin-bottom: 20px;
        }
        .day-col { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 13px; font-weight: bold; }
        .day-col input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: var(--tg-theme-button-color, #2481cc); margin: 0; }

        .toggle-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .toggle-btn {
            flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #526377;
            background: #232e3c; color: white; cursor: pointer; font-size: 16px; transition: 0.2s; font-weight: bold;
        }
        .toggle-btn.active-yes { background: #4CAF50; border-color: #4CAF50; }
        .toggle-btn.active-no { background: #F44336; border-color: #F44336; }

        .ranks-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .rank-item {
            border: 2px solid transparent; border-radius: 10px; padding: 5px; text-align: center; cursor: pointer; transition: 0.2s;
            background-color: var(--tg-theme-secondary-bg-color, #232e3c);
            aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; overflow: hidden; box-sizing: border-box;
        }
        .rank-item img { width: 100%; height: 100%; object-fit: contain; border-radius: 8px; pointer-events: none; }
        .rank-item.selected { border-color: var(--tg-theme-button-color, #2481cc); background-color: rgba(36, 129, 204, 0.2); }

        #submitBtn {
            width: 100%; padding: 15px; border-radius: 10px; border: none;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s;
        }
        #submitBtn:disabled { background-color: #555555; color: #888888; cursor: not-allowed; }

        /* --- СТИЛИ УВЕДОМЛЕНИЯ В ДУХЕ iOS --- */
        #ios-toast {
            position: fixed;
            top: -100px; /* Спрятано за экраном */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            padding: 14px 24px;
            border-radius: 100px; /* Сильное скругление */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 15px;
            font-weight: 500;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            text-align: center;
            width: max-content;
            max-width: 90%;
            pointer-events: none;
        }
        #ios-toast.show {
            top: 20px; /* Выезжает сверху */
        }
    </style>
</head>
<body>
    <div id="ios-toast">Ошибка валидации</div>

    <h2>Заявка в клан [A10m]</h2>
    <div class="warning">Предупреждение: за обман - бот вас кинет в Черный Список</div>

    <div class="row">
        <div>
            <label>Имя</label>
            <input type="text" id="fname" placeholder="Иван">
        </div>
        <div>
            <label>Фамилия</label>
            <input type="text" id="lname" placeholder="Иванов">
        </div>
    </div>

    <label>Айди в игре (ID)</label>
    <input type="number" id="game_id" placeholder="123456789" style="margin-bottom: 15px;" oninput="if(this.value.length > 9) this.value = this.value.slice(0, 9); if(this.value < 0) this.value = '';">

    <label>Возраст</label>
    <input type="number" id="age" placeholder="Например: 16" style="margin-bottom: 15px;" oninput="if(this.value.length > 2) this.value = this.value.slice(0, 2); if(this.value < 0) this.value = '';">

    <label>Макс. звание за 8 сезон</label>
    <input type="text" id="rank_8" placeholder="Например: Феникс" style="margin-bottom: 15px;">

    <label>Наличие Discord</label>
    <div class="toggle-group" id="discord-group">
        <button class="toggle-btn" data-val="yes">✅ Да</button>
        <button class="toggle-btn" data-val="no">❌ Нет</button>
    </div>

    <label>Макс. звание за 10 сезон по любому режиму</label>
    <div class="ranks-grid" id="ranks-group">
        <div class="rank-item" data-rank="Бронза"><img src="Bronze.png" alt="Bronze"></div>
        <div class="rank-item" data-rank="Сильвер"><img src="Silver.png" alt="Silver"></div>
        <div class="rank-item" data-rank="Голд"><img src="Gold.png" alt="Gold"></div>
        <div class="rank-item" data-rank="Феникс"><img src="Phoenix.png" alt="Phoenix"></div>
        <div class="rank-item" data-rank="Рейнджер"><img src="Ranger.png" alt="Ranger"></div>
        <div class="rank-item" data-rank="Чемпион"><img src="Champion.png" alt="Champion"></div>
        <div class="rank-item" data-rank="Мастер"><img src="Master.png" alt="Master"></div>
        <div class="rank-item" data-rank="Элита"><img src="Elite.png" alt="Elite"></div>
        <div class="rank-item" data-rank="Легенда"><img src="TheLegend.png" alt="Legend"></div>
    </div>

    <label>Сколько часов в неделю можете играть</label>
    <div class="hours-group">
        <input type="number" id="playtime_hours" placeholder="10" oninput="if(this.value < 0) this.value = '';">
        <span>ч.</span>
    </div>

    <label>Дни недели, по которым вы можете играть:</label>
    <div class="days-row">
        <div class="day-col">ПН<input type="checkbox" value="ПН" class="day-cb"></div>
        <div class="day-col">ВТ<input type="checkbox" value="ВТ" class="day-cb"></div>
        <div class="day-col">СР<input type="checkbox" value="СР" class="day-cb"></div>
        <div class="day-col">ЧТ<input type="checkbox" value="ЧТ" class="day-cb"></div>
        <div class="day-col">ПТ<input type="checkbox" value="ПТ" class="day-cb"></div>
        <div class="day-col">СБ<input type="checkbox" value="СБ" class="day-cb"></div>
        <div class="day-col">ВС<input type="checkbox" value="ВС" class="day-cb"></div>
    </div>

    <button id="submitBtn" disabled>ОТПРАВИТЬ ЗАЯВКУ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        let formData = { fname: "", lname: "", game_id: "", age: "", rank_8: "", discord: null, rank: null, play_hours: "", days: [] };
        let toastTimeout;

        // Функция показа iOS-уведомления
        function showToast(message) {
            const toast = document.getElementById('ios-toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000); // Пропадает через 3 секунды
        }

        // База частых имен, чтобы запретить их писать в поле Фамилия
        const firstNamesList = [
            "иван", "александр", "сергей", "андрей", "алексей", "максим", "михаил", "владимир", "николай", 
            "артем", "даниил", "илья", "кирилл", "антон", "дмитрий", "роман", "евгений", "олег", "павел",
            "денис", "руслан", "игорь", "вадим", "георгий", "ярослав", "богдан", "марк", "захар", "тимур",
            "матвей", "глеб", "макар", "арсений", "лев", "степан", "егор", "анна", "мария", "елена", 
            "дарья", "алина", "полина", "ольга", "юлия", "татьяна", "наталья", "виктория", "екатерина", 
            "анастасия", "ксения", "валерия", "софия", "александра", "алиса", "ева", "милана", "арина", 
            "кира", "вероника", "таисия", "маргарита", "василиса", "ульяна"
        ];

        function isFakeName(name) {
            // Разрешаем только буквы (русские/английские)
            const lettersOnlyRegex = /^[а-яА-ЯёЁa-zA-Z]+$/;
            if (!lettersOnlyRegex.test(name)) return true;
            
            // Запрещаем 3 одинаковые буквы подряд (например, "ааа")
            if (/(.)\1{2,}/.test(name)) return true;
            
            if (name.length < 2) return true;

            return false;
        }

        function validateForm() {
            formData.fname = document.getElementById('fname').value.trim();
            formData.lname = document.getElementById('lname').value.trim();
            formData.game_id = document.getElementById('game_id').value.trim();
            formData.age = document.getElementById('age').value.trim();
            formData.rank_8 = document.getElementById('rank_8').value.trim();
            formData.play_hours = document.getElementById('playtime_hours').value.trim();

            let checkedDays = Array.from(document.querySelectorAll('.day-cb:checked')).map(cb => cb.value);
            formData.days = checkedDays;

            // Кнопка активна, если все поля просто не пустые
            let isFilled = formData.fname && formData.lname && formData.game_id && formData.age && formData.rank_8 && formData.play_hours &&
                          formData.discord !== null && formData.rank !== null && formData.days.length > 0;
            
            document.getElementById('submitBtn').disabled = !isFilled;
        }

        ['fname', 'lname', 'game_id', 'age', 'rank_8', 'playtime_hours'].forEach(id => {
            document.getElementById(id).addEventListener('input', validateForm);
        });

        document.querySelectorAll('.day-cb').forEach(cb => {
            cb.addEventListener('change', validateForm);
        });

        document.querySelectorAll('#discord-group .toggle-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#discord-group .toggle-btn').forEach(b => b.classList.remove('active-yes', 'active-no'));
                let val = this.getAttribute('data-val');
                this.classList.add(val === 'yes' ? 'active-yes' : 'active-no');
                formData.discord = val === 'yes';
                validateForm();
            });
        });

        document.querySelectorAll('.rank-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.rank-item').forEach(r => r.classList.remove('selected'));
                this.classList.add('selected');
                formData.rank = this.getAttribute('data-rank');
                validateForm();
            });
        });

        document.getElementById('submitBtn').addEventListener('click', () => {
            let nameToCheck = formData.fname.toLowerCase();
            let surnameToCheck = formData.lname.toLowerCase();

            // Проверка 1: Несуществующее/глючное имя
            if (isFakeName(nameToCheck)) {
                showToast("⚠️ Введено некорректное имя");
                return; // Останавливаем отправку
            }

            // Проверка 2: Несуществующая/глючная фамилия
            if (isFakeName(surnameToCheck)) {
                showToast("⚠️ Введена некорректная фамилия");
                return; // Останавливаем отправку
            }

            // Проверка 3: Если в поле фамилии ввели популярное имя
            if (firstNamesList.includes(surnameToCheck)) {
                showToast("⚠️ Похоже, вы ввели имя вместо фамилии");
                return; // Останавливаем отправку
            }

            // Если все проверки пройдены:
            try {
                tg.sendData(JSON.stringify(formData));
                tg.close();
            } catch (err) {
                alert("Ошибка Telegram API: " + err.message);
            }
        });
    </script>
</body>
</html>
