<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A10m Application</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: white; padding: 15px; margin: 0; }
        h2 { text-align: center; margin-bottom: 5px; color: #fff; }
        .warning { color: #ff4d4d; font-style: italic; font-size: 14px; text-align: center; margin-bottom: 20px; display: block; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #bbb; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1e1e1e; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #0088cc; }

        /* Звания картинками */
        .rank-title { font-size: 14px; color: #bbb; margin-bottom: 10px; }
        .rank-row { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 20px; }
        .rank-card { flex: 1; background: #1e1e1e; border: 2px solid #333; border-radius: 10px; padding: 5px; cursor: pointer; transition: 0.2s; text-align: center; }
        .rank-card img { width: 100%; max-width: 40px; display: block; margin: 0 auto; }
        .rank-card.active { border-color: #0088cc; background: #0088cc33; }

        /* Кнопки Да/Нет */
        .toggle-label { font-size: 14px; color: #bbb; margin-bottom: 8px; display: block; }
        .toggle-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-toggle { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #1e1e1e; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-toggle.active-yes { background: #28a745; border-color: #28a745; }
        .btn-toggle.active-no { background: #dc3545; border-color: #dc3545; }

        #send_btn { 
            width: 100%; padding: 16px; background: #0088cc; color: white; border: none; 
            border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
        }
    </style>
</head>
<body>

    <h2>Заявка в клан [A10m]</h2>
    <span class="warning">Предупреждение: за обман - бот вас кинет в Черный Список</span>

    <div class="input-group">
        <label>Имя и Фамилия</label>
        <input type="text" id="full_name" placeholder="Например: Иван Иванов">
    </div>
    
    <div class="input-group">
        <label>Айди в игре (ID)</label>
        <input type="number" id="game_id" placeholder="12345678">
    </div>

    <div class="input-group">
        <label>Возраст</label>
        <input type="number" id="age" placeholder="15">
    </div>

    <div class="rank-title">Твое максимальное звание за 10 сезон:</div>
    <div class="rank-row" id="rank_box">
        <div class="rank-card" onclick="selectRank(this, 'Silver')"><img src="https://cdn-icons-png.flaticon.com/512/6022/6022450.png"></div>
        <div class="rank-card" onclick="selectRank(this, 'Gold')"><img src="https://cdn-icons-png.flaticon.com/512/6022/6022452.png"></div>
        <div class="rank-card" onclick="selectRank(this, 'Platinum')"><img src="https://cdn-icons-png.flaticon.com/512/6022/6022454.png"></div>
        <div class="rank-card" onclick="selectRank(this, 'Elite')"><img src="https://cdn-icons-png.flaticon.com/512/179/179539.png"></div>
        <div class="rank-card" onclick="selectRank(this, 'Legend')"><img src="https://cdn-icons-png.flaticon.com/512/179/179543.png"></div>
    </div>

    <label class="toggle-label">Есть ли Discord с рабочим микро?</label>
    <div class="toggle-group">
        <button class="btn-toggle" id="ds_yes" onclick="setToggle('discord', true)">Да</button>
        <button class="btn-toggle" id="ds_no" onclick="setToggle('discord', false)">Нет</button>
    </div>

    <label class="toggle-label">Возможность играть 7ч+ в неделю?</label>
    <div class="toggle-group">
        <button class="btn-toggle" id="play_yes" onclick="setToggle('playtime', true)">Да</button>
        <button class="btn-toggle" id="play_no" onclick="setToggle('playtime', false)">Нет</button>
    </div>

    <button id="send_btn">Отправить заявку</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let formData = { rank: "", discord: null, playtime: null };

        function selectRank(el, val) {
            document.querySelectorAll('.rank-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            formData.rank = val;
        }

        function setToggle(field, val) {
            formData[field] = val;
            const prefix = field === 'discord' ? 'ds_' : 'play_';
            document.getElementById(prefix + 'yes').className = 'btn-toggle' + (val === true ? ' active-yes' : '');
            document.getElementById(prefix + 'no').className = 'btn-toggle' + (val === false ? ' active-no' : '');
        }

        document.getElementById("send_btn").addEventListener("click", () => {
            let data = {
                name: document.getElementById("full_name").value,
                game_id: document.getElementById("game_id").value,
                age: document.getElementById("age").value,
                rank: formData.rank,
                discord: formData.discord,
                playtime: formData.playtime
            };

            if(!data.name || !data.game_id || !data.rank || data.discord === null) {
                alert("Заполни все поля и выбери звание!");
                return;
            }

            tg.sendData(JSON.stringify(data));
            tg.close();
        });
    </script>
</body>
</html>
