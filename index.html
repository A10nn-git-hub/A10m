<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A10m App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1b; color: white; padding: 20px; text-align: center; }
        h2 { margin-bottom: 5px; }
        .warning { color: #ff4d4d; font-style: italic; font-size: 16px; margin-top: 0; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #aaa; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #2b2b2c; color: white; box-sizing: border-box; }
        
        /* Звания в один ряд */
        .rank-container { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 20px; }
        .rank-btn { flex: 1; padding: 10px 2px; font-size: 11px; background: #2b2b2c; border: 1px solid #444; border-radius: 5px; color: white; cursor: pointer; }
        .rank-btn.active { background: #0088cc; border-color: #0088cc; }

        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; background: #2b2b2c; padding: 10px; border-radius: 8px; }
        .checkbox-group input { width: auto; }

        #send_btn { 
            width: 100%; padding: 15px; background: #0088cc; color: white; border: none; 
            border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>Заявка в клан [A10m]</h2>
    <p class="warning">Предупреждение: за обман - бот вас кинет в Черный Список</p>

    <div class="input-group">
        <label>Имя</label>
        <input type="text" id="fname" placeholder="Иван">
    </div>
    <div class="input-group">
        <label>Фамилия</label>
        <input type="text" id="lname" placeholder="Иванов">
    </div>
    <div class="input-group">
        <label>Возраст</label>
        <input type="number" id="age" placeholder="15">
    </div>

    <div class="input-group">
        <label>Твое максимальное звание за 10 сезон по любому режиму</label>
        <div class="rank-container" id="rank_box">
            <button class="rank-btn" onclick="selectRank(this, 'Silver')">Silv</button>
            <button class="rank-btn" onclick="selectRank(this, 'Gold')">Gold</button>
            <button class="rank-btn" onclick="selectRank(this, 'Plat')">Plat</button>
            <button class="rank-btn" onclick="selectRank(this, 'Elite')">Elit</button>
            <button class="rank-btn" onclick="selectRank(this, 'Leg')">Leg</button>
        </div>
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="discord">
        <label style="margin:0">Есть ли Discord с рабочим микро?</label>
    </div>
    <div class="checkbox-group">
        <input type="checkbox" id="playtime">
        <label style="margin:0">Возможность играть 7ч+ в неделю</label>
    </div>

    <button id="send_btn">Отправить заявку</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let selectedRank = "";

        function selectRank(btn, rank) {
            document.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedRank = rank;
        }

        document.getElementById("send_btn").addEventListener("click", () => {
            let data = {
                fname: document.getElementById("fname").value,
                lname: document.getElementById("lname").value,
                age: document.getElementById("age").value,
                rank: selectedRank,
                discord: document.getElementById("discord").checked,
                playtime: document.getElementById("playtime").checked
            };

            if(!data.fname || !data.rank) {
                alert("Заполни имя и выбери звание!");
                return;
            }

            tg.sendData(JSON.stringify(data));
            tg.close();
        });
    </script>
</body>
</html>
