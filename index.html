<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A10m App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; padding: 15px; margin: 0; }
        h2 { text-align: center; margin-bottom: 5px; }
        .warning { color: #ff4d4d; font-style: italic; font-size: 14px; text-align: center; display: block; margin-bottom: 15px; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #aaa; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1e1e1e; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #0088cc; }

        /* Сетка для 9 званий */
        .rank-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
        .rank-item { background: #1e1e1e; border: 2px solid #333; border-radius: 8px; padding: 5px; cursor: pointer; text-align: center; transition: 0.2s; }
        .rank-item img { width: 100%; height: auto; display: block; }
        .rank-item.active { border-color: #0088cc; background: #0088cc33; }

        /* Кнопки Да/Нет */
        .toggle-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-toggle { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #1e1e1e; color: white; cursor: pointer; font-weight: bold; }
        .btn-toggle.active-yes { background: #28a745; border-color: #28a745; }
        .btn-toggle.active-no { background: #dc3545; border-color: #dc3545; }

        #send_btn { 
            width: 100%; padding: 16px; background: #0088cc; color: white; border: none; 
            border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Заявка в [A10m]</h2>
    <span class="warning">Предупреждение: за обман - бот вас кинет в Черный Список</span>

    <div class="input-group">
        <label>Имя и Фамилия</label>
        <input type="text" id="full_name" placeholder="Иван Иванов">
    </div>
    
    <div class="input-group">
        <label>Айди в игре (ID)</label>
        <input type="number" id="game_id" placeholder="12345678">
    </div>

    <div class="input-group">
        <label>Возраст</label>
        <input type="number" id="age" placeholder="15">
    </div>

    <label>Макс. звание за 10 сезон (выбери картинку):</label>
    <div class="rank-grid">
        <div class="rank-item" onclick="selR(this, 'Silver 1')"><img src="https://placehold.co/40x40?text=S1"></div>
        <div class="rank-item" onclick="selR(this, 'Silver 2')"><img src="https://placehold.co/40x40?text=S2"></div>
        <div class="rank-item" onclick="selR(this, 'Silver 3')"><img src="https://placehold.co/40x40?text=S3"></div>
        <div class="rank-item" onclick="selR(this, 'Silver 4')"><img src="https://placehold.co/40x40?text=S4"></div>
        <div class="rank-item" onclick="selR(this, 'Gold 1')"><img src="https://placehold.co/40x40?text=G1"></div>
        <div class="rank-item" onclick="selR(this, 'Gold 2')"><img src="https://placehold.co/40x40?text=G2"></div>
        <div class="rank-item" onclick="selR(this, 'Gold 3')"><img src="https://placehold.co/40x40?text=G3"></div>
        <div class="rank-item" onclick="selR(this, 'Gold 4')"><img src="https://placehold.co/40x40?text=G4"></div>
        <div class="rank-item" onclick="selR(this, 'Phoenix')"><img src="https://placehold.co/40x40?text=PH"></div>
    </div>

    <label>Есть Discord с микрофоном?</label>
    <div class="toggle-group">
        <button class="btn-toggle" id="d_y" onclick="setT('discord', true)">Да</button>
        <button class="btn-toggle" id="d_n" onclick="setT('discord', false)">Нет</button>
    </div>

    <label>Возможность играть 7ч+ в неделю?</label>
    <div class="toggle-group">
        <button class="btn-toggle" id="p_y" onclick="setT('playtime', true)">Да</button>
        <button class="btn-toggle" id="p_n" onclick="setT('playtime', false)">Нет</button>
    </div>

    <button id="send_btn">Отправить заявку</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let res = { rank: "", discord: null, playtime: null };

        function selR(el, v) {
            document.querySelectorAll('.rank-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            res.rank = v;
        }

        function setT(f, v) {
            res[f] = v;
            let p = f === 'discord' ? 'd_' : 'p_';
            document.getElementById(p+'y').className = 'btn-toggle' + (v?' active-yes':'');
            document.getElementById(p+'n').className = 'btn-toggle' + (!v?' active-no':'');
        }

        document.getElementById("send_btn").onclick = () => {
            let d = {
                name: document.getElementById("full_name").value,
                game_id: document.getElementById("game_id").value,
                age: document.getElementById("age").value,
                rank: res.rank,
                discord: res.discord,
                playtime: res.playtime
            };
            if(!d.name || !d.game_id || !d.rank || d.discord === null) return alert("Заполни всё!");
            tg.sendData(JSON.stringify(d));
            tg.close();
        };
    </script>
</body>
</html>
